<script>
    function setLatencyChipById(targetId, iconId, ms, status) {
        const chip = document.getElementById(targetId);
        const icon = document.getElementById(iconId);
        if (!chip || !icon) return;

        chip.className = 'badge badge-pill d-flex align-items-center px-3 py-2';

        if (status === 'timeout') {
            chip.classList.add('badge-danger');
            icon.className = 'fa fa-times-circle mr-1';
            chip.innerHTML = '';
            chip.append(icon, '超时');
            return;
        }

        if (status === 'online') {
            const valueNum = Number(ms);
            if (!Number.isNaN(valueNum)) {
                if (valueNum <= 900) {
                    chip.classList.add('badge-success');
                    icon.className = 'fa fa-check-circle mr-1';
                } else {
                    chip.classList.add('badge-warning');
                    icon.className = 'fa fa-exclamation-triangle mr-1';
                }
                chip.innerHTML = '';
                chip.append(icon, `${valueNum}ms`);
                return;
            }
        }

        chip.classList.add('badge-secondary');
        icon.className = 'fa fa-question-circle mr-1';
        chip.innerHTML = '';
        chip.append(icon, '未知');
    }

    function updateLatencyForButton(url, chipId, iconId, timeoutMs = 5000) {
        const start = performance.now();
        const controller = new AbortController();
        const timeout = setTimeout(() => {
            controller.abort();
        }, timeoutMs);

        fetch(url, {
            method: 'HEAD',
            cache: 'no-cache',
            mode: 'no-cors',
            signal: controller.signal
        })
            .then(() => {
                clearTimeout(timeout);
                const ms = Math.round(performance.now() - start);
                setLatencyChipById(chipId, iconId, ms, 'online');
            })
            .catch(() => {
                clearTimeout(timeout);
                setLatencyChipById(chipId, iconId, 0, 'timeout');
            });
    }

    function updateSummary() {
        const online = navigator.onLine;
        document.getElementById('latency-summary').innerText = online ? '联通性检测：在线' : '联通性检测：离线';
    }

    function showFloatingToast(msg, type = 'info', duration = 2500) {
        let toast = document.getElementById('floating-toast');
        if (!toast) {
            toast = document.createElement('div');
            toast.id = 'floating-toast';
            toast.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9999;display:none;padding:0.8rem 1rem;border-radius:0.6rem;background:rgba(0,0,0,0.75);color:#fff;font-size:0.95rem;text-align:center;max-width:80vw;backdrop-filter:blur(3px);box-shadow:0 0 14px rgba(0,0,0,0.3);';
            document.body.appendChild(toast);
        }
        toast.textContent = msg;
        toast.style.display = 'block';
        toast.style.opacity = '0';
        toast.style.transition = 'opacity 220ms ease-in-out';
        requestAnimationFrame(() => {
            toast.style.opacity = '1';
        });
        setTimeout(() => {
            toast.style.opacity = '0';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 220);
        }, duration);
    }

    function setBookmarkStatus(msg, type) {
        showFloatingToast(msg, type, 2600);
        // 保持按钮状态不变，仅在页面中间显示通知
    }

    function copyText(text) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
            return navigator.clipboard.writeText(text);
        }
        return new Promise((resolve, reject) => {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.focus();
            textarea.select();
            try {
                const successful = document.execCommand('copy');
                document.body.removeChild(textarea);
                successful ? resolve() : reject();
            } catch (err) {
                document.body.removeChild(textarea);
                reject(err);
            }
        });
    }

    function tryBookmarkPage() {
        const url = window.location.href;
        const title = document.title || 'SsrCat';
        let bookmarkDone = false;

        try {
            if (window.external && window.external.AddFavorite) {
                window.external.AddFavorite(url, title);
                bookmarkDone = true;
            } else if (window.sidebar && window.sidebar.addPanel) {
                window.sidebar.addPanel(title, url, '');
                bookmarkDone = true;
            }
        } catch (e) {
            // ignore
        }

        // 复制 URL
        copyText(url).then(() => {
            if (bookmarkDone) {
                setBookmarkStatus('已收藏且已复制链接', 'ok');
            } else {
                const ua = navigator.userAgent.toLowerCase();
                if (/iphone|ipad|ipod/.test(ua)) {
                    setBookmarkStatus('已复制链接，iOS请在Safari分享中添加书签', 'warn');
                } else if (/android/.test(ua)) {
                    setBookmarkStatus('已复制链接，Android可手动添加书签/主屏幕', 'warn');
                } else if (/macintosh|mac os x/.test(ua)) {
                    setBookmarkStatus('已复制链接，macOS请使用⌘D收藏或从浏览器书签菜单添加', 'warn');
                } else if (/windows/.test(ua)) {
                    setBookmarkStatus('已复制链接，Windows请使用Ctrl+D收藏或从浏览器书签菜单添加', 'warn');
                } else {
                    setBookmarkStatus('已复制链接，建议使用浏览器菜单添加书签', 'warn');
                }
            }
        }).catch(() => {
            if (bookmarkDone) {
                setBookmarkStatus('已收藏到浏览器书签，但剪贴板复制失败，请手动复制链接', 'warn');
            } else {
                setBookmarkStatus('复制失败，请手动复制链接并使用浏览器书签功能', 'danger');
            }
        });

        if (bookmarkDone) {
            setBookmarkStatus('已收藏到浏览器书签，正在复制链接...', 'ok');
        } else {
            // 希望直接说明用户需要手动收藏
            setBookmarkStatus('浏览器不支持一键收藏，请手动添加书签，正在复制链接...', 'warn');
        }
    }

    document.addEventListener('DOMContentLoaded', function () {
        const bookmarkBtn = document.getElementById('btn-bookmark');
        if (bookmarkBtn) {
            bookmarkBtn.addEventListener('click', tryBookmarkPage);
        }
        setLatencyChipById('btn-latency-chip-main', 'btn-latency-icon-main', 0, 'unknown');
        setLatencyChipById('btn-latency-chip-backup1', 'btn-latency-icon-backup1', 0, 'unknown');
        setLatencyChipById('btn-latency-chip-backup2', 'btn-latency-icon-backup2', 0, 'unknown');
        setLatencyChipById('btn-latency-chip-backup3', 'btn-latency-icon-backup3', 0, 'unknown');

        // 主站和备用链接保持一致（与页面按钮链接一一对应）
        updateLatencyForButton('https://ssrcat.bar', 'btn-latency-chip-main', 'btn-latency-icon-main');
        updateLatencyForButton('https://ssrcat.bar', 'btn-latency-chip-backup1', 'btn-latency-icon-backup1');
        updateLatencyForButton('https://cloud.ssrcat.life', 'btn-latency-chip-backup2', 'btn-latency-icon-backup2');
        updateLatencyForButton('https://ssrcat.beer', 'btn-latency-chip-backup3', 'btn-latency-icon-backup3');

        updateSummary();
        setInterval(() => {
            updateLatencyForButton('https://ssrcat.bar', 'btn-latency-chip-main', 'btn-latency-icon-main');
            updateLatencyForButton('https://ssrcat.bar', 'btn-latency-chip-backup1', 'btn-latency-icon-backup1');
            updateLatencyForButton('https://cloud.ssrcat.life', 'btn-latency-chip-backup2', 'btn-latency-icon-backup2');
            updateLatencyForButton('https://ssrcat.beer', 'btn-latency-chip-backup3', 'btn-latency-icon-backup3');
            updateSummary();
        }, 5000);
    });
</script>
